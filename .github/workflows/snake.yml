name: Generate Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: karankumar-2112
          outputs: github-contribution-grid-snake.svg

      - name: Push snake
        run: |
          git checkout --orphan output
          git rm -rf .
          mv github-contribution-grid-snake.svg .
          git add .
          git config user.name github-actions
          git config user.email github-actions@github.com
          git commit -m "generate snake"
          git push origin output --force
